<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Assistant</title>
  <style>
    /* ---- SAP Fiori (Horizon) design tokens ---- */
    :root {
      --sapBrand:        #0070f2;
      --sapBrand-hover:  #0064d9;
      --sapBrand-active: #0058c9;
      --sapPage:         #f5f6f7;
      --sapTile:         #ffffff;
      --sapText:         #1d2d3e;
      --sapText-muted:   #556b82;
      --sapBorder:       #d9d9d9;
      --sapField-border: #758ca4;
      --sapShell-shadow: 0 0.125rem 0.5rem 0 rgba(34,54,72,.15);
      --sapTile-shadow:  0 0 0 0.0625rem rgba(34,54,72,.10), 0 0.125rem 0.5rem 0 rgba(34,54,72,.10);
      --sapSuccess:      #256f3a;
      --72: "72", "72full", -apple-system, "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--72);
      background: var(--sapPage);
      color: var(--sapText);
      display: flex; flex-direction: column;
      font-size: 0.875rem;
    }

    /* ---- Shell bar ---- */
    .shellbar {
      height: 2.75rem; flex: 0 0 auto;
      background: #fff;
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0 1rem;
      box-shadow: var(--sapShell-shadow);
      position: relative; z-index: 10;
    }
    .sap-logo { height: 1.5rem; width: auto; display: block; }
    .shell-title { font-size: 1rem; font-weight: 700; color: var(--sapText); }
    .shell-sep { width: 1px; height: 1.25rem; background: var(--sapBorder); }
    .shell-sub { font-size: 0.8125rem; color: var(--sapText-muted); font-weight: 400; }
    .shell-spacer { flex: 1; }
    .shell-actions { display: flex; align-items: center; gap: 0.25rem; }
    .shell-btn {
      width: 2.25rem; height: 2.25rem; border: 0; background: transparent;
      border-radius: 0.5rem; cursor: pointer; color: #475e75;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .shell-btn:hover { background: #eaecee; }
    .shell-avatar {
      width: 2rem; height: 2rem; border-radius: 50%;
      background: var(--sapBrand); color: #fff; font-weight: 700; font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center; margin-left: 0.25rem;
    }

    /* ---- Page / object card ---- */
    .page { flex: 1; overflow: hidden; display: flex; justify-content: center; padding: 1.25rem; }
    .card {
      width: min(720px, 100%); height: 100%;
      background: var(--sapTile);
      border-radius: 0.75rem; box-shadow: var(--sapTile-shadow);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .card-header { padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid #ebedef; }
    .card-header h2 { margin: 0; font-size: 1.0625rem; font-weight: 700; }
    .card-header p  { margin: 0.25rem 0 0; font-size: 0.8125rem; color: var(--sapText-muted); }

    /* ---- Chat log ---- */
    #log { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .row { display: flex; }
    .row.me { justify-content: flex-end; }
    .bubble {
      max-width: 78%; padding: 0.625rem 0.875rem; line-height: 1.45;
      white-space: pre-wrap; font-size: 0.875rem; border-radius: 0.75rem;
    }
    .bubble.me  { background: var(--sapBrand); color: #fff; border-bottom-right-radius: 0.25rem; }
    .bubble.bot { background: #f0f3f6; color: var(--sapText); border: 1px solid #e3e7eb; border-bottom-left-radius: 0.25rem; }

    /* typing indicator */
    .typing { display: inline-flex; gap: 0.25rem; align-items: center; }
    .typing span { width: 0.4rem; height: 0.4rem; border-radius: 50%; background: #9aa8b5; animation: blink 1.2s infinite both; }
    .typing span:nth-child(2) { animation-delay: .2s; } .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity: .25; } 40% { opacity: 1; } }

    /* quick-reply chips */
    .chips { display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0 1.25rem 0.75rem; }
    .chip {
      border: 1px solid var(--sapBrand); color: var(--sapBrand);
      background: #fff; border-radius: 1rem; padding: 0.3125rem 0.75rem;
      font-size: 0.8125rem; cursor: pointer; font-family: var(--72);
    }
    .chip:hover { background: #eaf3fe; }

    /* ---- Input bar ---- */
    .composer { display: flex; gap: 0.5rem; padding: 0.75rem 1.25rem; border-top: 1px solid #ebedef; background: #fff; }
    .field {
      flex: 1; padding: 0.5rem 0.75rem; font-size: 0.875rem; font-family: var(--72);
      border: 1px solid var(--sapField-border); border-radius: 0.375rem; color: var(--sapText);
      background: #fff; outline: none;
    }
    .field:focus { border-color: var(--sapBrand); box-shadow: 0 0 0 0.0625rem var(--sapBrand); }
    .btn {
      padding: 0 1.125rem; border: 0; border-radius: 0.375rem;
      background: var(--sapBrand); color: #fff; font-weight: 600; font-size: 0.875rem;
      cursor: pointer; font-family: var(--72);
    }
    .btn:hover:not(:disabled)  { background: var(--sapBrand-hover); }
    .btn:active:not(:disabled) { background: var(--sapBrand-active); }
    .btn:disabled { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <!-- Shell bar -->
  <div class="shellbar">
    <!-- SAP logo (recreated) -->
    <svg class="sap-logo" viewBox="0 0 110 54" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SAP">
      <defs>
        <linearGradient id="sapBlue" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#1c9be6"/><stop offset="1" stop-color="#0a6ed1"/>
        </linearGradient>
        <linearGradient id="sapGold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f6d365"/><stop offset="1" stop-color="#e9b000"/>
        </linearGradient>
      </defs>
      <polygon points="0,0 110,0 88,54 0,54" fill="url(#sapBlue)"/>
      <text x="12" y="39" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="url(#sapGold)" letter-spacing="1">SAP</text>
    </svg>
    <span class="shell-title">Leave Assistant</span>
    <div class="shell-sep"></div>
    <span class="shell-sub">SuccessFactors · Time Off</span>
    <div class="shell-spacer"></div>
    <div class="shell-actions">
      <button class="shell-btn" title="Search">&#128269;</button>
      <button class="shell-btn" title="Help">&#63;</button>
      <button class="shell-btn" title="Notifications">&#128276;</button>
      <div class="shell-avatar" title="Employee">EM</div>
    </div>
  </div>

  <!-- Page -->
  <div class="page">
    <section class="card">
      <div class="card-header">
        <h2>My Leave Assistant</h2>
        <p>Ask about your leave balance in plain language.</p>
      </div>

      <div id="log">
        <div class="row"><div class="bubble bot">Hi! 👋 I can check your leave balances from SAP SuccessFactors. What would you like to know?</div></div>
      </div>

      <div class="chips" id="chips">
        <button class="chip">How many leaves do I have?</button>
        <button class="chip">Annual leave balance</button>
        <button class="chip">Do I have any sick leave left?</button>
      </div>

      <form class="composer" id="form">
        <input id="input" class="field" autocomplete="off" placeholder="Type your question…" />
        <button id="send" class="btn" type="submit">Send</button>
      </form>
    </section>
  </div>

  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    function addRow(text, who) {
      const row = document.createElement('div');
      row.className = 'row ' + who;
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + who;
      bubble.textContent = text;
      row.appendChild(bubble);
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
      return bubble;
    }

    function addTyping() {
      const row = document.createElement('div');
      row.className = 'row bot';
      row.innerHTML = '<div class="bubble bot"><span class="typing"><span></span><span></span><span></span></span></div>';
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
      return row;
    }

    async function ask(message) {
      addRow(message, 'me');
      input.value = '';
      send.disabled = true;
      const typing = addTyping();
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message }),
        });
        const data = await res.json();
        const result = data.value || data;
        typing.remove();
        addRow(result.reply || (result.error && result.error.message) || 'No response.', 'bot');
      } catch (err) {
        typing.remove();
        addRow('Error: ' + err.message, 'bot');
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (message) ask(message);
    });

    document.getElementById('chips').addEventListener('click', (e) => {
      if (e.target.classList.contains('chip')) ask(e.target.textContent);
    });
  </script>
</body>
</html>
